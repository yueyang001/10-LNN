level: 01_beta_analysis
dataset: DeepShip
base_config: configs/train_distillation_deepship.yaml
train_script: train_distillation_deepship.py
default_gpus: "4,5,6,7"
output:
  checkpoints: checkpoints/hyperparameter_analysis/01_beta_analysis
  results_csv: results/hyperparameter_analysis/01_beta_analysis/results.csv
fixed:
  training.num_epochs: 200
  training.batch_size: 16
  training.lr: 0.0004
  training.weight_decay: 0.00008
  model.teacher.freeze: true
  distillation.distill_type: MTSKD_Temp
  distillation.USE_DYNAMIC_DISTILL_WEIGHT: false
  model.student.p_encoder: 0.1
  model.student.p_classifier: 0.35
experiments:
  - id: B1
    name: beta_0_1
    changes:
      distillation.learnable_beta: false
      distillation.beta: 0.1
  - id: B2
    name: beta_0_3
    changes:
      distillation.learnable_beta: false
      distillation.beta: 0.3
  - id: B3
    name: beta_0_5
    changes:
      distillation.learnable_beta: false
      distillation.beta: 0.5
  - id: B4
    name: beta_0_7
    changes:
      distillation.learnable_beta: false
      distillation.beta: 0.7
  - id: B5
    name: beta_0_9
    changes:
      distillation.learnable_beta: false
      distillation.beta: 0.9
  - id: B6
    name: beta_learnable
    changes:
      distillation.learnable_beta: true
