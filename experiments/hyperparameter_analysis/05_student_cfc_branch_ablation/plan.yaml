level: 05_student_cfc_branch_ablation
dataset: DeepShip
default_gpus: "4,5,6,7"
output:
  checkpoints: checkpoints/hyperparameter_analysis/05_student_cfc_branch_ablation
  results_csv: results/hyperparameter_analysis/05_student_cfc_branch_ablation/results.csv
fixed:
  training.num_epochs: 200
  model.teacher.freeze: true
  distillation.distill_type: MTSKD_Temp
  distillation.USE_DYNAMIC_DISTILL_WEIGHT: false
  model.student.seq_len: 16
  model.student.window_size: 4
  model.student.drasp_segment_len: 4
  model.student.wiring_units: 128
  model.student.cfc_output_size: 64
  model.student.cfc_sparsity_level: 0.5
  model.student.drasp_mode: full
experiments:
  - id: BR1
    name: full_fl_fg_bl_bg
    changes:
      model.student.cfc_branch_mode: full
  - id: BR2
    name: only_fl
    changes:
      model.student.cfc_branch_mode: only_fl
  - id: BR3
    name: fl_fg
    changes:
      model.student.cfc_branch_mode: fl_fg
  - id: BR4
    name: fl_bl
    changes:
      model.student.cfc_branch_mode: fl_bl
