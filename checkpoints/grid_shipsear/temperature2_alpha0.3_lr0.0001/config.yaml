dataset:
  data_dir: /media/hdd1/chuxiaohui/AI4Ocean_UATR/ShipsEar_622
  data_type: wav_s@wav_t
  num_workers: 4
distillation:
  alpha: 0.3
  distill_type: MTSKD_Temp
  learnable_alpha: false
  temperature: 2
  weight_type: uniform
distributed:
  backend: nccl
  gpu_ids:
  - 4
  - 5
  - 6
  - 7
  master_addr: localhost
  master_port: '12350'
model:
  num_classes: 5
  student:
    stu_seq_len: 16
  teacher:
    checkpoint_path: /media/hdd1/fubohan/Code/UATR/models/Audio_Teacher_ShipsEar_622/checkpoints/Student.pth
    freeze: true
    pretrained: true
save:
  save_dir: checkpoints/grid_shipsear/temperature2_alpha0.3_lr0.0001
  save_interval: 10
training:
  batch_size: 16
  log_interval: 20
  lr: 0.0001
  num_epochs: 100
  seed: 42
  weight_decay: 5e-4
