# 数据集配置
dataset:
  data_dir: '/media/hdd1/chuxiaohui/AI4Ocean_UATR/ShipsEar_622'
  data_type: 'wav'  # wav / mel / cqt / wav@mel@cqt
  num_workers: 4

# 模型配置
model:
  input_dim: 1
  num_classes: 5

# 训练配置
train:
  batch_size: 16
  # epochs: 100
  epochs: 200
  # lr: 1e-3
  lr: 0.0005
  weight_decay: 1.0e-4
  # weight_decay: 5.0e-4
  log_interval: 20
  # step_size: 10
  # gamma: 0.1

# 分布式训练配置
distributed:
  master_addr: 'localhost'
  # master_port: '12355'
  master_port: '12354'
  backend: 'nccl'
  gpu_ids: [4, 5, 6, 7]

# 保存配置
save:
  # save_dir: '/media/hdd1/fubohan/Code/UATR/checkpoints/LNN_Audio_ShipsEar'
  save_dir: '/media/hdd1/fubohan/Code/UATR/checkpoints/ShipsEar/LNN_100epoch_0130_4'
  save_interval: 10