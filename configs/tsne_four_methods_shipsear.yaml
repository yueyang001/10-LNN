# Four-method t-SNE comparison for ShipsEar.
# Replace the checkpoint paths with the four trained models you want to compare.

output_dir: results/tsne_four_methods_shipsear
feature_layer: logits       # logits | seq_features | encoder | pooled_seq
max_samples: 2000
perplexity: 30
batch_size: 32
seed: 42
n_iter: 1000

dataset:
  data_dir: /media/hdd1/chuxiaohui/AI4Ocean_UATR/ShipsEar_622
  split: validation
  data_type: wav_s
  num_workers: 4

model:
  num_classes: 5
  student:
    p_encoder: 0.355
    p_classifier: 0.255

methods:
  - name: Student Baseline
    checkpoint: checkpoints/ShipsEar/LNN_xxx/best_model.pth
    checkpoint_key: model_state_dict

  - name: Proposed Distillation
    checkpoint: checkpoints/ShipsEar/proposed_xxx/best_student.pth
    checkpoint_key: student_state_dict

  - name: Logits KD
    checkpoint: checkpoints/ShipsEar/comparison_distillation_kd/best_student.pth
    checkpoint_key: student_state_dict

  - name: Feature KD
    checkpoint: checkpoints/ShipsEar/comparison_distillation_rkd/best_student.pth
    checkpoint_key: student_state_dict
