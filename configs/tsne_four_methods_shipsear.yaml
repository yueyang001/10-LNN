# Four-method t-SNE comparison for ShipsEar.
# Replace the checkpoint paths with the four trained models you want to compare.

output_dir: results/tsne_four_methods_shipsear
feature_layer: logits       # logits | seq_features | encoder | pooled_seq
max_samples: 2000
perplexity: 30
batch_size: 32
seed: 42
n_iter: 1000

plot:
  legend_fontsize: 18
  filename_suffix: v1
  xlabel: t-SNE Component 1
  ylabel: t-SNE Component 2

# 顺序需与 AudioDataset 中 ShipsEar 的标签编号保持一致：A, D, C, B, E。
class_names:
  - Vessel A (Fishing/Trawlers/Tug/Dredger)
  - Vessel D (Ocean Liner/Ro-Ro)
  - Vessel C (Passenger Ferry)
  - Vessel B (Motorboat/Pilot/Sailboat)
  - Background Noise

dataset:
  data_dir: /media/hdd1/chuxiaohui/AI4Ocean_UATR/ShipsEar_622
  split: validation
  data_type: wav_s
  num_workers: 4

model:
  num_classes: 5
  student:
    p_encoder: 0.355
    p_classifier: 0.255

methods:
  - name: Student Baseline
    checkpoint: checkpoints/ablation_shipsear/num_epochs200_weight_decay0.0001_batch_size20_lr0.0005_freezeTrue_USE_DYNAMIC_DISTILL_WEIGHTFalse_p_encoder0.355_p_classifier0.255/checkpoint_epoch_112.pth

  - name: Proposed Distillation
    checkpoint: checkpoints/ablation_shipsear/num_epochs200_weight_decay0.0001_batch_size20_lr0.0005_distill_typeMTSKD_Temp_freezeTrue_USE_DYNAMIC_DISTILL_WEIGHTFalse_p_encoder0.355_p_classifier0.255/best_student.pth
    checkpoint_key: student_state_dict

  - name: Logits KD
    checkpoint: checkpoints/ShipsEar/comparison_distillation_kd/checkpoint_epoch_170.pth
    checkpoint_key: student_state_dict

  - name: Feature KD
    checkpoint: checkpoints/ShipsEar/comparison_distillation_v2_diffkd/best_student.pth
    checkpoint_key: student_state_dict
