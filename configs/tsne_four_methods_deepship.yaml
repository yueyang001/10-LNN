# Four-method t-SNE comparison for DeepShip.
# Replace the checkpoint paths with the four trained models you want to compare.

output_dir: results/tsne_four_methods_deepship_v2
feature_layer: logits       # logits | seq_features | encoder | pooled_seq
max_samples: 2000
perplexity: 30
batch_size: 32
seed: 42
n_iter: 1000

plot:
  filename_suffix: single_column
  comparison_figsize: [3.35, 3.0]
  single_figsize: [1.65, 1.45]
  compact_layout: true
  title_fontsize: 9
  point_size: 3
  point_alpha: 0.85
  edge_linewidth: 0
  show_grid: false
  show_axis_labels: false
  hide_ticks: true
  show_title: false
  show_spines: false
  show_legend: false
  save_comparison: false
  dpi: 600
  pad_inches: 0.01
  wspace: 0.03
  hspace: 0.2
  single_left: 0.02
  single_right: 0.99
  single_bottom: 0.02
  single_top: 0.99

class_names:
  - Passenger Ship
  - Tanker
  - Cargo Ship
  - Tug

dataset:
  data_dir: /media/hdd1/chuxiaohui/AI4Ocean_UATR/DeepShip_622
  split: validation
  data_type: wav_s
  num_workers: 4

model:
  num_classes: 4
  student:
    p_encoder: 0.355
    p_classifier: 0.255

methods:
  - name: Baseline
    checkpoint: checkpoints/ablation_deepship_0/num_epochs200_weight_decay8e-05_batch_size16_lr0.0004_freezeTrue_USE_DYNAMIC_DISTILL_WEIGHTFalse_p_encoder0.1_p_classifier0.35/checkpoint_epoch_190.pth

  - name: Best
    checkpoint: checkpoints/ablation_deepship/num_epochs200_weight_decay8e-05_batch_size16_lr0.0004_distill_typeMTSKD_Temp_freezeTrue_USE_DYNAMIC_DISTILL_WEIGHTFalse_p_encoder0.1_p_classifier0.35/best_student.pth
    checkpoint_key: student_state_dict

  - name: Logits KD
    checkpoint: checkpoints/DeepShip/comparison_distillation_kd/best_student.pth
    checkpoint_key: student_state_dict

  - name: Feature KD
    checkpoint: checkpoints/DeepShip/comparison_distillation_diffkd/best_student.pth
    checkpoint_key: student_state_dict
